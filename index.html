<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Diagnóstico Empresarial | Vinícius Soares</title>
  <meta name="description" content="Descubra o nível de dependência operacional da sua empresa.">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:20px}.shell{width:100%;max-width:640px}.brand{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.15em;margin-bottom:24px}.bar{height:3px;background:#2a2a2a;border-radius:3px;margin-bottom:28px;overflow:hidden}.fill{height:100%;background:#E8FF47;width:14%;transition:.25s}.step{font-size:12px;color:#E8FF47;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}.question{font-family:Georgia,serif;font-size:clamp(28px,6vw,40px);line-height:1.2;margin-bottom:24px}.options{display:flex;flex-direction:column;gap:10px}.opt{width:100%;border:1px solid #2a2a2a;background:#141414;color:#ddd;border-radius:16px;padding:16px;text-align:left;font-size:16px;line-height:1.45;cursor:pointer}.opt:hover{border-color:#E8FF47}.card{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:20px;margin-bottom:18px}.title{font-family:Georgia,serif;font-size:clamp(32px,7vw,46px);line-height:1.15;margin-bottom:10px}.muted{color:#999;line-height:1.6;margin-bottom:18px}.field{margin-bottom:14px}.field label{display:block;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.field input,.field select{width:100%;background:#141414;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:16px;padding:15px}.btn{width:100%;background:#E8FF47;color:#000;border:0;border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;text-align:center;text-decoration:none;display:block}.btn[disabled]{opacity:.5}.error{display:none;color:#ff8a8a;text-align:center;font-size:13px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}.mini{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:12px;text-align:center}.mini b{display:block;font-family:Georgia,serif;font-size:28px}.mini span{font-size:10px;color:#888;text-transform:uppercase}.actions{display:flex;gap:10px}.secondary{background:transparent;color:#fff;border:1px solid #2a2a2a}@media(max-width:480px){body{align-items:flex-start;padding:16px 14px}.grid{grid-template-columns:repeat(2,1fr)}.actions{flex-direction:column}.opt{font-size:15px}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">Diagnóstico Empresarial · Vinícius Soares</div>
    <section id="quiz">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div id="area"></div>
    </section>
    <section id="gate" style="display:none">
      <h1 class="title">Seu diagnóstico<br><span style="color:#E8FF47">está pronto.</span></h1>
      <p class="muted">Preencha abaixo para receber seu resultado completo e entender o próximo passo para sair desse nível.</p>
      <div class="field"><label>Seu nome</label><input id="nome" autocomplete="name" placeholder="Como prefere ser chamado?"></div>
      <div class="field"><label>WhatsApp</label><input id="wpp" inputmode="tel" autocomplete="tel" placeholder="(99) 99999-9999"></div>
      <div class="field"><label>Faturamento mensal aproximado</label><select id="fat"><option value="">Selecione</option><option>Até R$30 mil</option><option>R$30k - R$80k</option><option>R$80k - R$200k</option><option>R$200k - R$500k</option><option>Acima de R$500k</option></select></div>
      <button class="btn" id="submit">Ver meu resultado →</button>
      <div class="error" id="error"></div>
      <p class="muted" style="font-size:12px;text-align:center;margin-top:12px">Seus dados são usados exclusivamente para envio do diagnóstico.</p>
    </section>
    <section id="result" style="display:none"></section>
  </main>
<script>
const WEBHOOK='https://n8n.catapultadigital.com.br/webhook/a11c977b-a304-4721-b431-a4e6e3cadfr4';
const WHATSAPP='https://wa.me/556191449103';
const questions=[
 ['Se você tirar 15 dias de férias agora, o que acontece com sua empresa?',[['A','Continua funcionando normalmente — meu time resolve',3],['B','Funciona, mas com alguns problemas e me ligam bastante',2],['C','Para quase tudo ou vira um caos sem mim',1]]],
 ['Quantas das decisões do dia a dia da sua empresa dependem exclusivamente de você?',[['A','Poucas — meu time tem autonomia para resolver a maioria',3],['B','Algumas — sou consultado, mas não estou em tudo',2],['C','Quase todas — sem mim, nada anda',1]]],
 ['Sua empresa tem um processo de vendas que funciona sem a sua presença?',[['A','Sim — meu time vende bem sem precisar de mim',3],['B','Às vezes — mas os resultados são bem melhores quando estou',2],['C','Não — a maioria das vendas ainda depende de mim',1]]],
 ['Como está o faturamento da sua empresa nos últimos 3 meses?',[['A','Crescendo com consistência e previsibilidade',3],['B','Estável, mas travado num teto que não consigo quebrar',2],['C','Oscilando muito — não sei o que esperar do próximo mês',1]]],
 ['Você consegue dedicar mais de 5 horas por semana para pensar estrategicamente no futuro do seu negócio?',[['A','Sim — tenho esse espaço protegido na minha rotina',3],['B','Raramente — o dia a dia consome quase todo o meu tempo',2],['C','Nunca — estou sempre apagando incêndio',1]]],
 ['Se você dobrar o faturamento da sua empresa amanhã, sua operação daria conta?',[['A','Sim — tenho estrutura e time preparados para escalar',3],['B','Com dificuldade, mas acho que conseguiria',2],['C','Não — quebraria minha operação atual',1]]],
 ['Qual dessas frases representa melhor sua realidade hoje?',[['A','Minha empresa gera resultado com ou sem a minha presença diária',3],['B','Estou crescendo, mas ainda sou muito necessário no operacional',2],['C','Eu e minha empresa somos a mesma coisa — se eu parar, ela para',1]]]
];
const profiles=[
 {id:1,min:7,max:10,color:'#ff4444',tag:'Nível 1',title:'Refém da Operação',crm:'quiz_nivel_1_refem_operacao',desc:'Sua empresa está completamente dependente de você. Você fatura, mas não consegue crescer além de você mesmo. Isso não é falta de esforço. É ausência de estrutura.'},
 {id:2,min:11,max:16,color:'#EF9F27',tag:'Nível 2',title:'Empresário em Transição',crm:'quiz_nivel_2_empresario_transicao',desc:'Você já saiu do caos total, mas ainda está preso no meio do caminho. Sua empresa cresce, mas você ainda é o combustível principal.'},
 {id:3,min:17,max:21,color:'#E8FF47',tag:'Nível 3',title:'Quase Independente',crm:'quiz_nivel_3_quase_independente',desc:'Você já construiu uma base sólida. O próximo nível é transformar esse negócio numa máquina de crescimento previsível.'}
];
let index=0,score=0,answers=[];const el=id=>document.getElementById(id);function clean(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function render(){let q=questions[index];el('fill').style.width=Math.round((index+1)/questions.length*100)+'%';el('area').innerHTML='<div class="step">Pergunta '+(index+1)+' / '+questions.length+'</div><div class="question">'+clean(q[0])+'</div><div class="options">'+q[1].map((o,i)=>'<button class="opt" onclick="answer('+i+')"><b>'+o[0]+'.</b> '+clean(o[1])+'</button>').join('')+'</div>'}function answer(i){let q=questions[index],o=q[1][i];score+=o[2];answers.push({question:q[0],answer:o[1],letter:o[0],points:o[2]});if(window.dataLayer){window.dataLayer.push({event:'quiz_answered',question:index+1,points:o[2]})}index++;if(index<questions.length)render();else{el('quiz').style.display='none';el('gate').style.display='block'}}function phone(v){let d=String(v||'').replace(/\D/g,'');if(!d.startsWith('55'))d='55'+d;return '+'+d}function profile(){return profiles.find(p=>score>=p.min&&score<=p.max)||profiles[0]}function params(){let p=new URLSearchParams(location.search),o={};p.forEach((v,k)=>o[k]=v);return o}async function submit(){let nome=el('nome').value.trim(),wpp=el('wpp').value.trim(),fat=el('fat').value;if(nome.length<2)return showError('Informe seu nome.');if(wpp.replace(/\D/g,'').length<10)return showError('Informe um WhatsApp válido.');if(!fat)return showError('Selecione seu faturamento.');el('submit').disabled=true;el('submit').textContent='Enviando...';let p=profile(),payload={event:'quiz_completed',source:'Quiz Diagnóstico Empresarial',domain:'quiz.recordedefaturamento.com.br',lead:{name:nome,first_name:nome.split(' ')[0],phone:phone(wpp),revenue_range:fat},result:{score:score,max_score:21,score_percent:Math.round(score/21*100),level:p.tag,profile:p.title,crm_tag:p.crm,description:p.desc},answers:answers,attribution:params(),page:location.href,created_at:new Date().toISOString()};try{await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}catch(e){}showResult(payload)}function showError(msg){el('error').textContent=msg;el('error').style.display='block'}function showResult(payload){let p=profile(),n=clean(payload.lead.first_name);el('gate').style.display='none';el('result').style.display='block';el('result').innerHTML='<div class="step" style="color:'+p.color+'">'+p.tag+'</div><h2 class="title">'+n+', você é um<br><span style="color:'+p.color+'">'+clean(p.title)+'</span></h2><div class="grid"><div class="mini"><b style="color:'+p.color+'">'+score+'</b><span>Pontos</span></div><div class="mini"><b style="color:'+p.color+'">'+p.id+'</b><span>Nível</span></div><div class="mini"><b style="color:'+p.color+'">'+payload.result.score_percent+'%</b><span>Score</span></div><div class="mini"><b style="color:'+p.color+'">7</b><span>Respostas</span></div></div><div class="card" style="border-left:3px solid '+p.color+'">'+clean(p.desc)+'</div><div class="actions"><button class="btn secondary" onclick="location.reload()">Refazer quiz</button><a class="btn" href="'+WHATSAPP+'" target="_blank">Falar com o time ↗</a></div>'}el('submit').addEventListener('click',submit);render();
</script>
</body>
</html>
