<!doctype html><html lang=pt-BR><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Diagnóstico Empresarial</title><style>body{font-family:Arial;background:#0a0a0a;color:#eee;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:18px}.s{max-width:680px;width:100%}.b{height:3px;background:#333;margin:20px 0}.f{height:3px;background:#e8ff47}.q{font:32px Georgia;margin:18px 0}.o,.btn,input,select{width:100%;padding:15px;margin:6px 0;border-radius:12px;border:1px solid #333;background:#151515;color:#fff;font-size:16px}.btn{background:#e8ff47;color:#000;font-weight:700;cursor:pointer}.g{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.muted{color:#999}.err{color:#ff8a8a;display:none}.card{border:1px solid #333;border-radius:16px;padding:18px;background:#111}.score{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.score div{border:1px solid #333;border-radius:12px;padding:10px;text-align:center}@media(max-width:600px){body{align-items:flex-start}.g,.score{grid-template-columns:1fr}}</style></head><body><main class=s><div>Diagnóstico Empresarial · Vinícius Soares</div><section id=quiz><div class=b><div id=bar class=f></div></div><div id=area></div></section><section id=gate style=display:none><div class=card><h1>Seu diagnóstico<br><span style=color:#e8ff47>está pronto.</span></h1><p class=muted>Preencha os dados abaixo para liberar seu resultado.</p><div class=g><input id=nome name=nome placeholder="* Nome"><input id=email name=e-mail placeholder="* E-mail"><input id=wpp name=ddd-whatsapp placeholder="* DDD + WhatsApp"><select id=func name=quantos-funcionrios-tem-sua-empresa><option value="">* Quantos funcionários tem sua empresa ?</option><option>Não tenho</option><option>1 a 4</option><option>5 a 10</option><option>11 a 20</option><option>21 a 50</option><option>51 a 100</option><option>Acima de 100</option></select><select id=dono name=voc-dono-do-seu-negcio><optio
